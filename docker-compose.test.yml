services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=products
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  product-tests:
    container_name: product-tests
    build:
      context: .
      dockerfile: Dockerfile.product.tests
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - APP_DB_USER=postgres
      - APP_DB_PASSWORD=test
      - APP_DB_URL=postgres://postgres:test@postgres:5432/products?sslmode=disable
    command: go test -v -count=1 ./internal/repository/postgres/...
